name: Release firmware

# FQBN-based build (so vendored ./libraries are picked up; profiles can't use
# --libraries). Platform/libs/FQBN are read from each sketch's sketch.yaml.
# Library display names can contain spaces (e.g. "Adafruit PN532"), so libs are
# installed one-per-line.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: adv
            sketch: "CardputerPN532"
            asset: cypher-pn532-cardputer-adv.merged.bin
          - profile: cypherbox_mini
            sketch: "CypherboxMiniPN532"
            asset: cypher-pn532-cypherbox-mini-xiao-c3.merged.bin
          - profile: devkitc
            sketch: "cypher-pn7160"
            asset: cypher-pn532-esp32-devkitc-pn7160.merged.bin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR="$HOME/bin" sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Resolve platform + libraries from sketch.yaml
        id: prof
        run: |
          python3 -c "import yaml" 2>/dev/null || sudo apt-get install -y python3-yaml
          python3 - "${{ matrix.sketch }}" "${{ matrix.profile }}" <<'PY'
          import sys, os, yaml
          sketch, profile = sys.argv[1], sys.argv[2]
          p = yaml.safe_load(open(os.path.join(sketch, "sketch.yaml")))["profiles"][profile]
          def conv(s):
              s = s.strip()
              if "(" in s:
                  n, v = s.split("(", 1)
                  return f"{n.strip()}@{v.strip(') ').strip()}"
              return s
          urls = ",".join(pl.get("platform_index_url", "") for pl in p.get("platforms", []) if pl.get("platform_index_url"))
          plats = " ".join(conv(pl["platform"]) for pl in p.get("platforms", []))
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"fqbn={p['fqbn']}\n")
          out.write(f"urls={urls}\n")
          out.write(f"plats={plats}\n")
          # Library display names may contain spaces -> write one per line.
          with open(os.path.join(sketch, "arduino_libs.txt"), "w") as lf:
              for l in p.get("libraries", []):
                  lf.write(conv(l) + "\n")
          PY

      - name: Install platform + libraries
        run: |
          cd "${{ matrix.sketch }}"
          URLS="${{ steps.prof.outputs.urls }}"
          ADD=""
          [ -n "$URLS" ] && ADD="--additional-urls $URLS"
          arduino-cli core update-index $ADD
          arduino-cli core install ${{ steps.prof.outputs.plats }} $ADD
          while IFS= read -r lib; do
            [ -n "$lib" ] && arduino-cli lib install "$lib"
          done < arduino_libs.txt

      - name: Compile ${{ matrix.profile }}
        run: |
          cd "${{ matrix.sketch }}"
          LIBARG=""
          [ -d libraries ] && LIBARG="--libraries libraries"
          rm -rf build_out
          arduino-cli compile --fqbn "${{ steps.prof.outputs.fqbn }}" $LIBARG --output-dir build_out .

      - name: Collect merged binary
        run: |
          merged="$(ls "${{ matrix.sketch }}"/build_out/*.merged.bin 2>/dev/null | head -1)"
          if [ -z "$merged" ]; then
            echo "::error::No *.merged.bin produced."
            ls -R "${{ matrix.sketch }}/build_out" || true
            exit 1
          fi
          cp "$merged" "${{ matrix.asset }}"
          ls -l "${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
